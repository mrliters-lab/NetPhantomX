<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR-LITERS LAB | المشاريع</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.25;
        }

        .scanner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff00, #00ff00, transparent);
            box-shadow: 0 0 20px #00ff00;
            animation: scan 4s linear infinite;
            z-index: 10;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* === Navigation Bar === */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(0, 10, 0, 0.92);
            border-bottom: 1px solid #00cc00;
            backdrop-filter: blur(12px);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
        }

        .nav-logo {
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .nav-logo:hover {
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links a {
            color: #00cc00;
            text-decoration: none;
            font-size: 14px;
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 2px;
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .nav-links a.active::after {
            width: 100%;
        }

        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }

        .nav-hamburger span {
            width: 25px;
            height: 2px;
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .nav-hamburger {
                display: flex;
            }
            .nav-links {
                position: fixed;
                top: 60px;
                right: -100%;
                width: 70%;
                height: calc(100vh - 60px);
                background: rgba(0, 10, 0, 0.97);
                flex-direction: column;
                padding: 40px 30px;
                gap: 20px;
                border-left: 1px solid #00cc00;
                transition: right 0.4s ease;
            }
            .nav-links.open {
                right: 0;
            }
        }

        /* === Container === */
        .container {
            position: relative;
            z-index: 1;
            padding: 100px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === Page Header === */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .page-header h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(28px, 6vw, 52px);
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00cc00;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
            animation: headerPulse 3s ease-in-out infinite;
        }

        @keyframes headerPulse {
            0%, 100% { text-shadow: 0 0 20px #00ff00, 0 0 40px #00cc00; }
            50% { text-shadow: 0 0 30px #00ff00, 0 0 60px #00ff00, 0 0 80px #00cc00; }
        }

        .page-header p {
            color: #009900;
            font-size: clamp(14px, 3vw, 18px);
            font-family: 'Share Tech Mono', monospace;
            direction: ltr;
        }

        .glow-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            margin: 30px 0;
            box-shadow: 0 0 10px #00ff00;
        }

        /* === Stats Section === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #004400;
            border-radius: 10px;
            padding: 25px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        .stat-card:hover {
            border-color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            transform: translateY(-5px);
        }

        .stat-number {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(32px, 5vw, 48px);
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #009900;
            font-weight: 700;
        }

        /* === Filter Tabs === */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #004400;
            color: #00cc00;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .filter-btn.active {
            background: rgba(0, 255, 0, 0.15);
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        /* === Projects Grid === */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }

        .project-card {
            background: rgba(0, 15, 0, 0.85);
            border: 1px solid #003300;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }

        .project-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00ff00, #00cc00, #00ff00);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover::after {
            opacity: 1;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: #00cc00;
            box-shadow: 
                0 0 40px rgba(0, 255, 0, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .project-image {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #003300;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(80%) brightness(0.6) contrast(1.2);
            transition: all 0.5s ease;
        }

        .project-card:hover .project-image img {
            filter: grayscale(30%) brightness(0.8) contrast(1.1);
        }

        .project-image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 40%, rgba(0, 10, 0, 0.9));
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }

        .project-status {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid;
        }

        .status-active {
            color: #00ff00;
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .status-dev {
            color: #ffcc00;
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        .status-coming {
            color: #00ffff;
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .project-body {
            padding: 20px;
        }

        .project-title {
            font-size: 20px;
            font-weight: 900;
            color: #33ff33;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
        }

        .project-desc {
            font-size: 13px;
            color: #009900;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .tech-tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            padding: 3px 10px;
            background: rgba(0, 255, 0, 0.08);
            border: 1px solid #004400;
            border-radius: 3px;
            color: #00cc00;
            transition: all 0.3s ease;
        }

        .tech-tag:hover {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #002200;
        }

        .project-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #006600;
            direction: ltr;
        }

        .project-link {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #00cc00;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            transition: all 0.3s ease;
            padding: 5px 12px;
            border: 1px solid #004400;
            border-radius: 5px;
        }

        .project-link:hover {
            color: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            text-shadow: 0 0 10px #00ff00;
        }

        .project-link .material-icons {
            font-size: 16px;
        }

        /* === Timeline Section === */
        .timeline-section {
            margin: 60px 0;
        }

        .timeline-section h2 {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(22px, 4vw, 32px);
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
            text-align: center;
            margin-bottom: 40px;
        }

        .timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            right: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #00cc00, #00cc00, transparent);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .timeline-item {
            display: flex;
            justify-content: flex-end;
            padding: 0 0 40px 0;
            position: relative;
            width: 50%;
            margin-right: auto;
            padding-left: 40px;
        }

        .timeline-item:nth-child(even) {
            justify-content: flex-start;
            margin-left: auto;
            margin-right: 0;
            padding-left: 0;
            padding-right: 40px;
            width: 50%;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: -6px;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
            z-index: 2;
        }

        .timeline-item:nth-child(even)::after {
            right: -6px;
            left: auto;
        }

        .timeline-content {
            background: rgba(0, 20, 0, 0.85);
            border: 1px solid #004400;
            border-radius: 8px;
            padding: 20px;
            position: relative;
            transition: all 0.3s ease;
        }

        .timeline-content:hover {
            border-color: #00cc00;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
        }

        .timeline-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: #00ff00;
            margin-bottom: 8px;
            direction: ltr;
            text-align: left;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .timeline-title {
            font-size: 18px;
            font-weight: 900;
            color: #33ff33;
            margin-bottom: 8px;
        }

        .timeline-desc {
            font-size: 13px;
            color: #009900;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .timeline::before {
                right: 15px;
            }
            .timeline-item,
            .timeline-item:nth-child(even) {
                width: 100%;
                margin: 0;
                padding-right: 40px;
                padding-left: 0;
                justify-content: flex-end;
            }
            .timeline-item::after,
            .timeline-item:nth-child(even)::after {
                right: 9px;
                left: auto;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }

        /* === Terminal Command Section === */
        .cmd-section {
            margin: 50px 0;
        }

        .cmd-section h2 {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(22px, 4vw, 32px);
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
            text-align: center;
            margin-bottom: 30px;
        }

        .terminal-input-area {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(0, 15, 0, 0.9);
            border: 2px solid #00cc00;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .terminal-bar {
            background: rgba(0, 40, 0, 0.5);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #004400;
        }

        .terminal-bar-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-output {
            padding: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: #00cc00;
            direction: ltr;
            text-align: left;
            min-height: 180px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.8;
        }

        .terminal-output::-webkit-scrollbar {
            width: 6px;
        }

        .terminal-output::-webkit-scrollbar-track {
            background: rgba(0, 10, 0, 0.5);
        }

        .terminal-output::-webkit-scrollbar-thumb {
            background: #004400;
            border-radius: 3px;
        }

        .terminal-output .output-line {
            margin-bottom: 4px;
            animation: fadeInLine 0.3s ease;
        }

        @keyframes fadeInLine {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .terminal-output .prompt-sym {
            color: #00ff00;
        }

        .terminal-output .cmd-text {
            color: #33ff33;
        }

        .terminal-output .result-text {
            color: #00cc00;
        }

        .terminal-output .error-text {
            color: #ff4444;
        }

        .terminal-output .highlight-text {
            color: #00ffff;
        }

        .terminal-input-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-top: 1px solid #003300;
            background: rgba(0, 10, 0, 0.5);
        }

        .terminal-input-row .prompt-sym {
            color: #00ff00;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .terminal-input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #00ff00;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            direction: ltr;
            text-align: left;
            caret-color: #00ff00;
        }

        .terminal-input-row input::placeholder {
            color: #004400;
        }

        /* === Footer === */
        .footer {
            text-align: center;
